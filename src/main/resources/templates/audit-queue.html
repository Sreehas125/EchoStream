<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Audit Queue')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('audit')}"></header>

<main class="page">
    <div class="container">
        <p class="notice" th:if="${message}" th:text="${message}"></p>
        <section class="card">
            <h2>Member 4: Pending Audit Queue</h2>
            <table class="table">
                <thead>
                <tr>
                    <th>Track ID</th>
                    <th>Title</th>
                    <th>Creator</th>
                    <th>Lifecycle State</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(pendingTracks)}">
                    <td colspan="5">No tracks in PendingAudit state.</td>
                </tr>
                <tr th:each="track : ${pendingTracks}">
                    <td th:text="${track.id}"></td>
                    <td th:text="${track.title}"></td>
                    <td th:text="${track.creator != null ? track.creator.fullName : '-'}"></td>
                    <td><span class="badge warning" th:text="${track.lifecycleState}"></span></td>
                    <td>
                        <div class="form-row">
                            <form th:action="@{'/audit-queue/' + ${track.id} + '/approve'}" method="post">
                                <button type="submit">Approve</button>
                            </form>
                            <form th:action="@{'/audit-queue/' + ${track.id} + '/reject'}" method="post">
                                <button type="submit" class="secondary">Reject</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
