<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rights Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/mvc.css" />
</head>
<body>
<nav class="topbar">
    <div class="container">
        <a class="brand" href="/">EchoStream MVC</a>
        <div class="nav-links">
            <a class="nav-link" href="/ingestion-dashboard">Ingestion</a>
            <a class="nav-link active" href="/rights-management">Rights</a>
            <a class="nav-link" href="/royalty-report">Royalty</a>
            <a class="nav-link" href="/audit-queue">Audit</a>
        </div>
    </div>
</nav>

<main class="page-shell">
    <section class="hero">
        <p class="eyebrow">Rights Console</p>
        <h1>License Health and Renewal Workflow</h1>
    </section>

<div class="container-fluid p-0">
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
    <div class="panel">
        <div class="panel-header">Member 2: Active Tracks and License Status</div>
        <div class="table-wrap">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Track ID</th>
                    <th>Title</th>
                    <th>License Code</th>
                    <th>Status</th>
                    <th>Valid Until</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tracks)}">
                    <td colspan="6" class="text-center text-muted py-4">No tracks available.</td>
                </tr>
                <tr th:each="track : ${tracks}">
                    <td th:text="${track.id}"></td>
                    <td th:text="${track.title}"></td>
                    <td th:text="${latestByTrack[track.id] != null ? latestByTrack[track.id].licenseCode : 'N/A'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${latestByTrack[track.id] != null and latestByTrack[track.id].effectiveUntil != null and latestByTrack[track.id].effectiveUntil.isAfter(today.minusDays(1))} ? 'bg-success' : 'bg-secondary'"
                              th:text="${latestByTrack[track.id] != null and latestByTrack[track.id].effectiveUntil != null and latestByTrack[track.id].effectiveUntil.isAfter(today.minusDays(1))} ? 'Active' : 'Expired / Missing'">
                        </span>
                    </td>
                    <td th:text="${latestByTrack[track.id] != null ? latestByTrack[track.id].effectiveUntil : '-'}"></td>
                    <td class="d-flex gap-2">
                        <form th:action="@{'/rights-management/' + ${track.id} + '/renew'}" method="post">
                            <button class="btn btn-sm btn-primary" type="submit">Renew License</button>
                        </form>
                        <form th:action="@{'/rights-management/' + ${track.id} + '/revoke'}" method="post">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Revoke Access</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>
</body>
</html>
