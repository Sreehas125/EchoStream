<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Rights Management')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('rights')}"></header>

<main class="page">
    <div class="container">
        <p class="notice" th:if="${message}" th:text="${message}"></p>
        <section class="card">
            <h2>Member 2: Active Tracks and License Status</h2>
            <table class="table">
                <thead>
                <tr>
                    <th>Track ID</th>
                    <th>Title</th>
                    <th>License Code</th>
                    <th>Status</th>
                    <th>Valid Until</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tracks)}">
                    <td colspan="6">No tracks available.</td>
                </tr>
                <tr th:each="track : ${tracks}">
                    <td th:text="${track.id}"></td>
                    <td th:text="${track.title}"></td>
                    <td th:text="${latestByTrack[track.id] != null ? latestByTrack[track.id].licenseCode : 'N/A'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${latestByTrack[track.id] != null and latestByTrack[track.id].effectiveUntil != null and latestByTrack[track.id].effectiveUntil.isAfter(today.minusDays(1))} ? 'success' : 'danger'"
                              th:text="${latestByTrack[track.id] != null and latestByTrack[track.id].effectiveUntil != null and latestByTrack[track.id].effectiveUntil.isAfter(today.minusDays(1))} ? 'Active' : 'Expired / Missing'"></span>
                    </td>
                    <td th:text="${latestByTrack[track.id] != null ? latestByTrack[track.id].effectiveUntil : '-'}"></td>
                    <td>
                        <div class="form-row">
                            <form th:action="@{'/rights-management/' + ${track.id} + '/renew'}" method="post">
                                <button type="submit">Renew License</button>
                            </form>
                            <form th:action="@{'/rights-management/' + ${track.id} + '/revoke'}" method="post">
                                <button type="submit" class="secondary">Revoke Access</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
