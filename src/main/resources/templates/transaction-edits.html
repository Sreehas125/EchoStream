<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Transaction Edits')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('transactions')}"></header>

<main class="page">
    <div class="container grid two">
        <section class="card">
            <h2>Payment Transaction Edits</h2>
            <p class="notice" th:if="${message}" th:text="${message}"></p>
            <p class="notice error" th:if="${error}" th:text="${error}"></p>

            <form th:action="@{/transaction-edits/update}" th:object="${editForm}" method="post" class="form-grid">
                <div class="form-row">
                    <label>Transaction ID</label>
                    <input type="number" th:field="*{transactionId}" readonly required />
                </div>
                <div class="form-row">
                    <label>Currency</label>
                    <input th:field="*{currency}" maxlength="3" placeholder="USD" required />
                </div>
                <div class="form-row">
                    <label>Status</label>
                    <select th:field="*{status}" required>
                        <option value="">Select Status</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                    </select>
                </div>
                <button type="submit">Save Transaction Changes</button>
            </form>
            <p class="hint">Select a transaction from the table to load it into the edit form.</p>
        </section>

        <section class="card">
            <h2>Transactions</h2>
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Ref</th>
                    <th>Amount</th>
                    <th>Currency</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="6">No transactions yet.</td>
                </tr>
                <tr th:each="tx : ${transactions}">
                    <td th:text="${tx.id}"></td>
                    <td th:text="${tx.transactionRef}"></td>
                    <td th:text="${tx.amount}"></td>
                    <td th:text="${tx.currency}"></td>
                    <td th:text="${tx.status}"></td>
                    <td>
                        <form th:action="@{/transaction-edits/select}" method="post">
                            <input type="hidden" name="transactionId" th:value="${tx.id}" />
                            <button type="submit" class="secondary">Edit</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
