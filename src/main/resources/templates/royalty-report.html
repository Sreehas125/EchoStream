<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Royalty Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">EchoStream MVC</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/ingestion-dashboard">Ingestion</a>
            <a class="nav-link" href="/rights-management">Rights</a>
            <a class="nav-link active" href="/royalty-report">Royalty</a>
            <a class="nav-link" href="/audit-queue">Audit</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header">Member 3: Strategy-Based Royalty Calculator</div>
                <div class="card-body">
                    <form th:action="@{/royalty-report}" th:object="${royaltyForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Audio Track ID</label>
                            <input class="form-control" type="number" th:field="*{audioTrackId}" required min="1" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stream Count</label>
                            <input class="form-control" type="number" th:field="*{streamCount}" required min="0" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Gross Revenue</label>
                            <input class="form-control" type="number" step="0.01" th:field="*{grossRevenue}" required min="0" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Calculation Mode</label>
                            <select class="form-select" th:field="*{mode}">
                                <option value="FIXED">FixedRateStrategy</option>
                                <option value="SHARE">RevenueShareStrategy</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fixed Rate / Stream</label>
                            <input class="form-control" type="number" step="0.01" th:field="*{fixedRatePerStream}" min="0" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Revenue Share %</label>
                            <input class="form-control" type="number" step="0.01" th:field="*{revenueSharePercent}" min="0" />
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Calculate Payout</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h6>Total Payouts</h6>
                            <h3 th:text="${totalPaid}">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h6>Total Transactions</h6>
                            <h3 th:text="${transactionCount}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-3">
                <div class="card-header">Calculated Strategy Output</div>
                <div class="card-body">
                    <p class="mb-1">Current Mode: <strong th:text="${royaltyForm.mode}">FIXED</strong></p>
                    <p class="mb-0">Calculated Payout: <strong th:text="${calculatedPayout != null ? calculatedPayout : 'Run calculation'}"></strong></p>
                </div>
            </div>

            <div class="card shadow-sm mt-3">
                <div class="card-header">Payment Transactions</div>
                <div class="card-body p-0">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>Ref</th>
                            <th>Amount</th>
                            <th>Currency</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(transactions)}">
                            <td colspan="4" class="text-center text-muted py-4">No transactions yet.</td>
                        </tr>
                        <tr th:each="tx : ${transactions}">
                            <td th:text="${tx.transactionRef}"></td>
                            <td th:text="${tx.amount}"></td>
                            <td th:text="${tx.currency}"></td>
                            <td th:text="${tx.status}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
