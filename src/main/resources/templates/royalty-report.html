<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Royalty Report')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('royalty')}"></header>

<main class="page">
    <div class="container grid two">
        <section class="card">
            <h2>Member 3: Strategy-Based Royalty Calculator</h2>
            <form th:action="@{/royalty-report}" th:object="${royaltyForm}" method="post" class="form-grid">
                <div class="form-row">
                    <label>Audio Track ID</label>
                    <input type="number" th:field="*{audioTrackId}" required min="1" />
                </div>
                <div class="form-row">
                    <label>Stream Count</label>
                    <input type="number" th:field="*{streamCount}" required min="0" />
                </div>
                <div class="form-row">
                    <label>Gross Revenue</label>
                    <input type="number" step="0.01" th:field="*{grossRevenue}" required min="0" />
                </div>
                <div class="form-row">
                    <label>Calculation Mode</label>
                    <select th:field="*{mode}">
                        <option value="FIXED">FixedRateStrategy</option>
                        <option value="SHARE">RevenueShareStrategy</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Fixed Rate / Stream</label>
                    <input type="number" step="0.01" th:field="*{fixedRatePerStream}" min="0" />
                </div>
                <div class="form-row">
                    <label>Revenue Share %</label>
                    <input type="number" step="0.01" th:field="*{revenueSharePercent}" min="0" />
                </div>
                <button type="submit">Calculate Payout</button>
            </form>
        </section>

        <section class="card">
            <h2>Royalty Dashboard</h2>
            <div class="grid">
                <div class="card">
                    <h3>Total Payouts</h3>
                    <p th:text="${totalPaid}">0</p>
                </div>
                <div class="card">
                    <h3>Total Transactions</h3>
                    <p th:text="${transactionCount}">0</p>
                </div>
                <div class="card">
                    <h3>Calculated Strategy Output</h3>
                    <p>Current Mode: <strong th:text="${royaltyForm.mode}">FIXED</strong></p>
                    <p>Calculated Payout: <strong th:text="${calculatedPayout != null ? calculatedPayout : 'Run calculation'}"></strong></p>
                </div>
            </div>
        </section>
    </div>

    <div class="container">
        <section class="card">
            <h2>Payment Transactions</h2>
            <table class="table">
                <thead>
                <tr>
                    <th>Ref</th>
                    <th>Amount</th>
                    <th>Currency</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="4">No transactions yet.</td>
                </tr>
                <tr th:each="tx : ${transactions}">
                    <td th:text="${tx.transactionRef}"></td>
                    <td th:text="${tx.amount}"></td>
                    <td th:text="${tx.currency}"></td>
                    <td th:text="${tx.status}"></td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
