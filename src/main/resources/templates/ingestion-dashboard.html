<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingestion Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/mvc.css" />
</head>
<body>
<nav class="topbar">
    <div class="container">
        <a class="brand" href="/">EchoStream MVC</a>
        <div class="nav-links">
            <a class="nav-link active" href="/ingestion-dashboard">Ingestion</a>
            <a class="nav-link" href="/rights-management">Rights</a>
            <a class="nav-link" href="/royalty-report">Royalty</a>
            <a class="nav-link" href="/audit-queue">Audit</a>
        </div>
    </div>
</nav>

<main class="page-shell">
    <section class="hero">
        <p class="eyebrow">Ingestion Operations</p>
        <h1>Upload and Validate Incoming Audio Tracks</h1>
    </section>

<div class="container-fluid p-0">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="panel">
                <div class="panel-header">Member 1: Upload Audio Track</div>
                <div class="panel-body">
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                    <form th:action="@{/ingestion-dashboard}" th:object="${ingestionForm}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Track Type</label>
                            <select class="form-select" th:field="*{trackType}">
                                <option value="MUSIC">MUSIC</option>
                                <option value="PODCAST">PODCAST</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Content Creator</label>
                            <select class="form-select" th:field="*{creatorId}" required>
                                <option value="">Select Creator</option>
                                <option th:each="creator : ${creators}" th:value="${creator.id}" th:text="${creator.fullName + ' (#' + creator.id + ')'}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input class="form-control" th:field="*{title}" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Duration (seconds)</label>
                            <input class="form-control" type="number" min="1" th:field="*{durationSeconds}" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Audio File Path</label>
                            <input class="form-control" th:field="*{filePath}" placeholder="C:/audio/file.mp3" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Album / Show Name</label>
                            <input class="form-control" th:field="*{albumName}" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Genre</label>
                            <input class="form-control" th:field="*{genre}" />
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Upload and Validate</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="panel">
                <div class="panel-header">Signal Validation Status</div>
                <div class="table-wrap">
                    <table class="table table-striped mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Duration</th>
                            <th>Validation</th>
                            <th>Lifecycle</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(tracks)}">
                            <td colspan="6" class="text-center text-muted py-4">No tracks ingested yet.</td>
                        </tr>
                        <tr th:each="track : ${tracks}">
                            <td th:text="${track.id}"></td>
                            <td th:text="${track.title}"></td>
                            <td th:text="${track.class.simpleName}"></td>
                            <td th:text="${track.durationSeconds}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${track.durationSeconds != null and track.durationSeconds >= 120} ? 'bg-success' : 'bg-warning text-dark'"
                                      th:text="${track.durationSeconds != null and track.durationSeconds >= 120} ? 'High Quality' : 'Low Quality'">
                                </span>
                            </td>
                            <td th:text="${track.lifecycleState}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
</body>
</html>
