<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ingestion Dashboard')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('ingestion')}"></header>

<main class="page">
    <div class="container grid two">
        <section class="card">
            <h2>Member 1: Upload Audio Track</h2>
            <p class="notice" th:if="${message}" th:text="${message}"></p>
            <p class="notice error" th:if="${error}" th:text="${error}"></p>
            <form id="ingestionForm" th:action="@{/ingestion-dashboard}" th:object="${ingestionForm}" method="post" enctype="multipart/form-data" class="form-grid">
                <div class="form-row">
                    <label>Track Type</label>
                    <select id="trackType" th:field="*{trackType}">
                        <option value="MUSIC">MUSIC</option>
                        <option value="PODCAST">PODCAST</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Content Creator</label>
                    <select th:field="*{creatorId}" required>
                        <option value="">Select Creator</option>
                        <option th:each="creator : ${creators}" th:value="${creator.id}" th:text="${creator.fullName + ' (#' + creator.id + ')'}"></option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Title</label>
                    <input th:field="*{title}" required />
                </div>
                <div class="form-row">
                    <label>Duration (seconds)</label>
                    <input type="number" min="1" th:field="*{durationSeconds}" required />
                </div>
                <div class="form-row">
                    <label>Audio File (Local Upload)</label>
                    <input id="uploadFile" type="file" th:field="*{uploadFile}" required />
                    <small id="uploadHint" class="hint">MUSIC limit: 10 MB</small>
                    <small id="uploadError" class="error-text" aria-live="polite"></small>
                </div>
                <div class="form-row">
                    <label>Album / Show Name</label>
                    <input th:field="*{albumName}" />
                </div>
                <div class="form-row">
                    <label>Genre</label>
                    <input th:field="*{genre}" />
                </div>
                <button type="submit">Upload and Validate</button>
            </form>
        </section>

        <section class="card">
            <h2>Signal Validation Status</h2>
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Duration</th>
                    <th>Validation</th>
                    <th>Lifecycle</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tracks)}">
                    <td colspan="6">No tracks ingested yet.</td>
                </tr>
                <tr th:each="track : ${tracks}">
                    <td th:text="${track.id}"></td>
                    <td th:text="${track.title}"></td>
                    <td th:text="${track.class.simpleName}"></td>
                    <td th:text="${track.durationSeconds}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${track.durationSeconds != null and track.durationSeconds >= 120} ? 'success' : 'warning'"
                              th:text="${track.durationSeconds != null and track.durationSeconds >= 120} ? 'High Quality' : 'Low Quality'"></span>
                    </td>
                    <td th:text="${track.lifecycleState}"></td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script>
    (function () {
        const MB = 1024 * 1024;
        const limits = {
            MUSIC: 10 * MB,
            PODCAST: 100 * MB
        };

        const form = document.getElementById('ingestionForm');
        const trackType = document.getElementById('trackType');
        const uploadFile = document.getElementById('uploadFile');
        const uploadHint = document.getElementById('uploadHint');
        const uploadError = document.getElementById('uploadError');

        if (!form || !trackType || !uploadFile || !uploadHint || !uploadError) {
            return;
        }

        function updateHint() {
            const isPodcast = trackType.value === 'PODCAST';
            uploadHint.textContent = isPodcast ? 'PODCAST limit: 100 MB' : 'MUSIC limit: 10 MB';
        }

        function validateUploadSize() {
            uploadError.textContent = '';
            const file = uploadFile.files && uploadFile.files[0];
            if (!file) {
                return true;
            }

            const selectedType = trackType.value === 'PODCAST' ? 'PODCAST' : 'MUSIC';
            const maxBytes = limits[selectedType];
            if (file.size > maxBytes) {
                const maxMb = selectedType === 'PODCAST' ? 100 : 10;
                uploadError.textContent = 'Selected file is too large. ' + selectedType + ' allows up to ' + maxMb + ' MB.';
                return false;
            }

            return true;
        }

        trackType.addEventListener('change', function () {
            updateHint();
            validateUploadSize();
        });

        uploadFile.addEventListener('change', validateUploadSize);
        form.addEventListener('submit', function (event) {
            if (!validateUploadSize()) {
                event.preventDefault();
            }
        });

        updateHint();
    })();
</script>
</body>
</html>
