<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/mvc.css" />
</head>
<body>
<nav class="topbar">
    <div class="container">
        <a class="brand" href="/">EchoStream MVC</a>
        <div class="nav-links">
            <a class="nav-link" href="/ingestion-dashboard">Ingestion</a>
            <a class="nav-link" href="/rights-management">Rights</a>
            <a class="nav-link" href="/royalty-report">Royalty</a>
            <a class="nav-link active" href="/audit-queue">Audit</a>
        </div>
    </div>
</nav>

<main class="page-shell">
    <section class="hero">
        <p class="eyebrow">Audit Flow</p>
        <h1>Pending Audit Decisions and Review Queue</h1>
    </section>

<div class="container-fluid p-0">
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
    <div class="panel">
        <div class="panel-header">Member 4: Pending Audit Queue</div>
        <div class="table-wrap">
            <table class="table table-bordered mb-0">
                <thead>
                <tr>
                    <th>Track ID</th>
                    <th>Title</th>
                    <th>Creator</th>
                    <th>Lifecycle State</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(pendingTracks)}">
                    <td colspan="5" class="text-center text-muted py-4">No tracks in PendingAudit state.</td>
                </tr>
                <tr th:each="track : ${pendingTracks}">
                    <td th:text="${track.id}"></td>
                    <td th:text="${track.title}"></td>
                    <td th:text="${track.creator != null ? track.creator.fullName : '-'}"></td>
                    <td><span class="badge bg-warning text-dark" th:text="${track.lifecycleState}"></span></td>
                    <td class="d-flex gap-2">
                        <form th:action="@{'/audit-queue/' + ${track.id} + '/approve'}" method="post">
                            <button class="btn btn-sm btn-success" type="submit">Approve</button>
                        </form>
                        <form th:action="@{'/audit-queue/' + ${track.id} + '/reject'}" method="post">
                            <button class="btn btn-sm btn-danger" type="submit">Reject</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>
</body>
</html>
